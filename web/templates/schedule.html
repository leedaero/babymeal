{% extends "_base.html" %}
{% set active_tab = 'schedule' %}
{% block title %}식단표 — 치밀한 이유식{% endblock %}

{% block content %}
<div x-data="schedulePage()" x-init="init()"
     @meal-saved="onMealSaved()"
     @close-modal="showAddModal=false">

  <!-- 월 네비게이션 -->
  <div class="cal-header">
    <button class="btn btn-sm btn-muted" @click="prevMonth()">◀</button>
    <span class="cal-month-label" x-text="viewMonthLabel"></span>
    <button class="btn btn-sm btn-muted" @click="nextMonth()">▶</button>
    <button class="btn btn-sm btn-blue" @click="goToday()" style="margin-left:.25rem;">오늘</button>
  </div>

  <!-- 캘린더 -->
  <div class="cal-wrap">
    <div class="cal-weekdays">
      <span style="color:#e74c3c">일</span>
      <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span>
      <span style="color:#3498db">토</span>
    </div>
    <div class="cal-grid">
      <template x-for="cell in calendarDays" :key="cell.d.getTime()">
        <div class="cal-cell" :class="{ 'cal-today': isToday(cell.d), 'cal-other': cell.other }">
          <div class="cal-cell-head">
            <span class="cal-date-num" x-text="cell.d.getDate()"></span>
            <button class="cal-add-btn" @click.stop="openAddMeal(_dateStr(cell.d))" title="식단 추가">+</button>
          </div>
          <template x-for="meal in mealsForDate(cell.d)" :key="meal.id">
            <div class="cal-chip"
                 :style="`background:${chipColor(meal.status)}22;border-left:3px solid ${chipColor(meal.status)}`"
                 @click="openDetail(meal)">
              <span x-text="MEAL_LABELS[meal.meal_time]"></span>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- 식단 상세 모달 -->
  <template x-if="selectedMeal">
    <div class="modal-overlay" @click.self="closeDetail()">
      <div class="modal-box">
        <p class="modal-title" x-text="detailDateLabel(selectedMeal.date)"></p>
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;">
          <span class="meal-time-label" x-text="MEAL_LABELS[selectedMeal.meal_time]"></span>
          <span class="badge" :class="statusBadge(selectedMeal.status).cls"
                x-text="statusBadge(selectedMeal.status).text"></span>
        </div>

        <div class="form-group">
          <label class="form-label">재료</label>
          <template x-if="!selectedMeal.ingredients || selectedMeal.ingredients.length === 0">
            <p style="font-size:.8rem;color:var(--text-muted);padding:.25rem 0;">재료 없음</p>
          </template>
          <template x-for="mi in (selectedMeal.ingredients || [])" :key="mi.ingredient_id">
            <div class="ing-row">
              <span class="ing-row-emoji" x-text="mi.emoji"></span>
              <span class="ing-row-name"  x-text="mi.name"></span>
              <span style="font-size:.82rem;color:var(--text-muted);" x-text="`${mi.grams}g`"></span>
            </div>
          </template>
        </div>

        <div class="form-actions" style="flex-wrap:wrap;gap:.4rem;">
          <template x-if="selectedMeal.status==='upcoming'||selectedMeal.status==='skipped'">
            <button class="btn btn-sm btn-green" @click="changeStatus(selectedMeal,'confirmed')">✅ 먹었어요</button>
          </template>
          <template x-if="selectedMeal.status==='auto-consumed'||selectedMeal.status==='confirmed'">
            <button class="btn btn-sm btn-muted" @click="changeStatus(selectedMeal,'skipped')">↩ 안 먹었어요</button>
          </template>
          <button class="btn btn-sm btn-danger" @click="deleteMeal(selectedMeal)">🗑 삭제</button>
          <button class="btn btn-sm btn-muted" @click="closeDetail()" style="margin-left:auto;">닫기</button>
        </div>
      </div>
    </div>
  </template>

  <!-- 식단 추가 모달 -->
  <template x-if="showAddModal">
    <div class="modal-overlay" @click.self="showAddModal=false">
      <div class="modal-box" x-data="mealModal(addDefaultDate, ingredients)">
        <p class="modal-title">식단 추가</p>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">날짜</label>
            <input class="form-input" type="date" x-model="date" required>
          </div>
          <div class="form-group">
            <label class="form-label">끼니</label>
            <select class="form-input" x-model="mealTime">
              <template x-for="mt in mealTimes" :key="mt.value">
                <option :value="mt.value" x-text="mt.label"></option>
              </template>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">재료 용량 (g)</label>
          <template x-if="ingredients.length===0">
            <p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0;">
              먼저 재고 탭에서 재료를 추가해주세요
            </p>
          </template>
          <template x-for="ing in ingredients" :key="ing.id">
            <div class="ing-row">
              <span class="ing-row-emoji" x-text="ing.emoji"></span>
              <span class="ing-row-name"  x-text="ing.name"></span>
              <input class="ing-row-input" type="number" min="0" placeholder="0"
                     :value="grams[ing.id]||''"
                     @input="grams[ing.id]=parseInt($event.target.value)||0">
              <span class="ing-row-unit">g</span>
            </div>
          </template>
        </div>
        <div class="form-actions">
          <button class="btn btn-muted" @click="$dispatch('close-modal')">취소</button>
          <button class="btn btn-blue"  @click="submit()" :disabled="!hasIngredients">추가하기</button>
        </div>
      </div>
    </div>
  </template>

</div>
{% endblock %}
