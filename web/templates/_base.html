<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}치밀한 이유식{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}?v=3"></script>
  <script>window._csrfToken = {{ csrf_token()|tojson }};</script>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout"
     x-data="{ open: JSON.parse(localStorage.getItem('sidebarOpen') ?? String(window.innerWidth > 600)) }"
     x-init="$watch('open', v => localStorage.setItem('sidebarOpen', v))">

  <aside class="sidebar" :class="open ? '' : 'collapsed'">
    <div class="sidebar-header">
      <a href="/" class="sidebar-brand">
        <span class="sidebar-icon">🍼</span>
        <span class="sidebar-text">치밀한 이유식</span>
      </a>
      <button class="sidebar-toggle" @click="open = !open" :title="open ? '접기' : '펼치기'">
        <span x-text="open ? '◀' : '▶'"></span>
      </button>
    </div>
    <nav class="tab-nav">
      <a href="/"         class="tab-btn {% if active_tab == 'inventory' %}active{% endif %}">
        <span class="sidebar-icon">🧊</span><span class="sidebar-text">재고현황</span>
      </a>
      <a href="/schedule" class="tab-btn {% if active_tab == 'schedule'  %}active{% endif %}">
        <span class="sidebar-icon">📅</span><span class="sidebar-text">식단표</span>
      </a>
      <a href="/stats" class="tab-btn {% if active_tab == 'stats' %}active{% endif %}">
        <span class="sidebar-icon">📊</span><span class="sidebar-text">통계</span>
      </a>
      <a href="/allergy" class="tab-btn {% if active_tab == 'allergy' %}active{% endif %}">
        <span class="sidebar-icon">🧪</span><span class="sidebar-text">알러지 테스트</span>
      </a>
      {% if is_admin %}
      <a href="/settings" class="tab-btn {% if active_tab == 'settings'  %}active{% endif %}">
        <span class="sidebar-icon">⚙️</span><span class="sidebar-text">설정</span>
      </a>
      {% endif %}
    </nav>
    {% if is_admin and all_users %}
    <div style="padding:.5rem 1rem;">
      <select onchange="switchUser(this.value)"
              style="width:100%;padding:.3rem .5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.8rem;cursor:pointer;">
        {% for u in all_users %}
        <option value="{{ u.id }}" {% if u.id == view_user_id %}selected{% endif %}>
          {{ u.username }}{% if u.id == view_user_id %} ✓{% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    {% endif %}
    <div class="sidebar-bottom">
      <span class="sidebar-user"><span class="sidebar-icon">👤</span><span class="sidebar-text">{{ username }}</span></span>
      <a href="/logout" class="btn btn-sm btn-muted">
        <span class="sidebar-icon">🚪</span><span class="sidebar-text">로그아웃</span>
      </a>
    </div>
  </aside>

  {% if is_viewing_other %}
  <div onclick="resetUser()"
       style="position:fixed;top:0;left:0;right:0;z-index:999;background:#e67e22;color:#fff;
              text-align:center;padding:.4rem;font-size:.85rem;cursor:pointer;">
    👁 <strong>{{ view_username }}</strong> 계정 보는 중 — 클릭하여 본인으로 복귀
  </div>
  {% endif %}

  <div class="content-wrap" :class="open ? '' : 'collapsed'">
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>
  <script>
  function switchUser(userId) {
    fetch('/api/admin/switch-user', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRF-Token': window._csrfToken || ''},
      body: JSON.stringify({user_id: parseInt(userId)})
    }).then(r => { if (r.ok) location.reload(); else r.json().then(d => alert(d.error || '전환 실패')); });
  }
  function resetUser() {
    fetch('/api/admin/switch-user', {
      method: 'DELETE',
      headers: {'X-CSRF-Token': window._csrfToken || ''}
    }).then(r => { if (r.ok) location.reload(); else alert('복귀 실패'); });
  }
  </script>
</body>
</html>
