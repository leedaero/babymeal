<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}치밀한 이유식{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}?v=2"></script>
  <script>window._csrfToken = {{ csrf_token()|tojson }};</script>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <a href="/" class="sidebar-brand">
      <span>🍼</span><span>치밀한 이유식</span>
    </a>
    <nav class="tab-nav">
      <a href="/"         class="tab-btn {% if active_tab == 'inventory' %}active{% endif %}">🧊 재고현황</a>
      <a href="/schedule" class="tab-btn {% if active_tab == 'schedule'  %}active{% endif %}">📅 식단표</a>
    </nav>
    <div class="sidebar-bottom">
      <span class="sidebar-user">{{ username }}</span>
      <a href="/logout" class="btn btn-sm btn-muted">로그아웃</a>
    </div>
  </aside>

  <div class="content-wrap">
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>
</body>
</html>
