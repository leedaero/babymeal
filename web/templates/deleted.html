{% extends "_base.html" %}
{% set active_tab = 'deleted' %}
{% block title %}삭제된 큐브 — 치밀한 이유식{% endblock %}

{% block content %}
<div x-data="deletedPage()">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
    <h2 style="font-size:1rem;font-weight:700;color:var(--text-primary);">🗑 삭제된 큐브 내역</h2>
    <span style="font-size:.78rem;color:var(--text-muted);" x-text="items.length + '개'"></span>
  </div>

  <template x-if="items.length === 0">
    <div style="text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:.875rem;">
      삭제된 재료가 없습니다
    </div>
  </template>

  <div style="display:flex;flex-direction:column;gap:.6rem;">
    <template x-for="ing in items" :key="ing.id">
      <div class="deleted-card">
        <div class="deleted-card-header">
          <div style="display:flex;align-items:center;gap:.6rem;">
            <div class="deleted-icon" :style="`background-color:${ing.color}22`">
              <span x-text="ing.emoji" style="font-size:1.25rem;"></span>
            </div>
            <div>
              <p style="font-weight:600;font-size:.875rem;" x-text="ing.name"></p>
              <p style="font-size:.72rem;color:var(--text-muted);"
                 x-text="ing.unit_type !== 'quantity' ? `${ing.weight_per_cube}g / 큐브` : '수량 단위'"></p>
            </div>
          </div>
          <button class="btn btn-sm btn-green" @click="restore(ing)">복원</button>
        </div>

        <div class="deleted-meta">
          <span x-text="`제작일: ${ing.created_at}`"></span>
          <template x-if="ing.deleted_at">
            <span x-text="`삭제일: ${ing.deleted_at}`"></span>
          </template>
          <span x-text="`총 ${ing.total_cubes}큐브 제작`"></span>
        </div>

        <!-- 이력 토글 -->
        <div>
          <button class="deleted-log-toggle"
                  @click="toggleLogs(ing)">
            <span x-text="ing._open ? '▲ 이력 닫기' : '▼ 이력 보기'"></span>
          </button>
          <template x-if="ing._open">
            <div class="deleted-log-wrap">
              <template x-if="!ing._logs">
                <p style="font-size:.78rem;color:var(--text-muted);padding:.5rem 0;text-align:center;">
                  로딩 중…
                </p>
              </template>
              <template x-if="ing._logs && ing._logs.length === 0">
                <p style="font-size:.78rem;color:var(--text-muted);padding:.5rem 0;text-align:center;">
                  이력 없음
                </p>
              </template>
              <template x-if="ing._logs && ing._logs.length > 0">
                <div>
                  <template x-for="log in ing._logs" :key="log.id">
                    <div class="deleted-log-row">
                      <span x-text="logLabel(log)"></span>
                      <div style="display:flex;gap:.75rem;align-items:center;">
                        <span :style="log.delta > 0 ? 'color:#27ae60;font-weight:600' : 'color:#e74c3c;font-weight:600'"
                              x-text="(log.delta > 0 ? '+' : '') + log.delta + '개'"></span>
                        <span style="font-size:.72rem;color:var(--text-muted);" x-text="log.logged_at"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

</div>
{% endblock %}
