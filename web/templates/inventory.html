{% extends "_base.html" %}
{% set active_tab = 'inventory' %}
{% block title %}재고현황 — 치밀한 이유식{% endblock %}

{% block content %}
<div x-data="inventoryPage()" x-init="init()"
     @saved="onSaved()"
     @close-modal="showAddModal=false">

  <template x-if="lowStockItems.length > 0">
    <div class="stock-warning">
      <span class="stock-warning-icon">🚨</span>
      <div>
        <p class="stock-warning-title">재고 부족 알림</p>
        <p class="stock-warning-body">
          <template x-for="i in lowStockItems" :key="i.id">
            <span x-text="`${i.emoji} ${i.name} (${i.current_cubes}개 남음)  `"></span>
          </template>
        </p>
      </div>
    </div>
  </template>

  <div class="cube-grid">
    <template x-for="ing in ingredients" :key="ing.id">
      <div class="cube-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;">
          <div class="cube-icon" :style="`background-color:${ing.color}22`">
            <template x-if="ing.image_url">
              <img :src="ing.image_url" width="40" height="40"
                   style="object-fit:contain;display:block;" alt="">
            </template>
            <template x-if="!ing.image_url">
              <span x-text="ing.emoji"></span>
            </template>
          </div>
          <div style="display:flex;gap:.25rem;">
            <button class="btn btn-sm btn-muted" @click="openHistory(ing)" style="padding:.2rem .5rem;" title="이력 보기">📋</button>
            <button class="btn btn-sm btn-muted" @click="openEdit(ing)" style="padding:.2rem .5rem;">✏️</button>
            <button class="btn btn-sm btn-danger" @click="deleteIngredient(ing)" style="padding:.2rem .5rem;">🗑</button>
          </div>
        </div>
        <div>
          <p class="cube-name" x-text="ing.name"></p>
          <template x-if="ing.unit_type !== 'quantity'">
            <p class="cube-unit" x-text="`${ing.weight_per_cube}g / 큐브`"></p>
          </template>
        </div>
        <template x-if="expiryStatus(ing.created_at) === 'warning'">
          <span class="badge badge-warning" x-text="`⚠️ ${expiryDays(ing.created_at)}일 경과`"></span>
        </template>
        <template x-if="expiryStatus(ing.created_at) === 'danger'">
          <span class="badge badge-danger" x-text="`🚨 ${expiryDays(ing.created_at)}일 경과`"></span>
        </template>
        <div class="cube-count-row">
          <button class="adj-btn" @click="adjust(ing.id, -1)">−</button>
          <span class="cube-count" :class="ing.current_cubes <= 3 ? 'low' : ''"
                x-text="ing.current_cubes + (ing.current_cubes <= 3 ? ' 🚨' : '')"></span>
          <button class="adj-btn" @click="adjust(ing.id, +1)">+</button>
        </div>
        <template x-if="ing.unit_type !== 'quantity' && ing.weight_per_cube">
          <p class="cube-remaining-grams"
             x-text="`남은 ${ing.current_cubes * ing.weight_per_cube}g`"></p>
        </template>
      </div>
    </template>

    <button class="cube-add-btn" @click="openAdd()">
      <span style="font-size:1.75rem;">+</span>
      <span>큐브 추가</span>
    </button>
  </div>

  <template x-if="showHistoryModal">
    <div class="modal-overlay" @click.self="showHistoryModal = false">
      <div class="modal-box">
        <p class="modal-title" x-text="`📋 ${historyIng?.name} 이력`"></p>
        <template x-if="historyLogs.length === 0">
          <p style="color:var(--text-muted);text-align:center;padding:1rem 0;">이력이 없습니다</p>
        </template>
        <div style="max-height:380px;overflow-y:auto;">
          <template x-for="log in historyLogs" :key="log.id">
            <div style="display:flex;justify-content:space-between;align-items:center;
                        padding:.5rem 0;border-bottom:1px solid var(--border);">
              <div>
                <span x-text="historyLabel(log)"></span>
                <template x-if="log.note">
                  <span style="font-size:.8rem;color:var(--text-muted);"
                        x-text="` (${log.note})`"></span>
                </template>
              </div>
              <div style="display:flex;gap:1rem;align-items:center;">
                <span :style="log.delta > 0 ? 'color:#27ae60;font-weight:600' : 'color:#e74c3c;font-weight:600'"
                      x-text="(log.delta > 0 ? '+' : '') + log.delta + '개'"></span>
                <span style="font-size:.78rem;color:var(--text-muted);" x-text="log.logged_at"></span>
              </div>
            </div>
          </template>
        </div>
        <div class="form-actions">
          <button class="btn btn-muted" @click="showHistoryModal = false">닫기</button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="showAddModal">
    <div class="modal-overlay" @click.self="showAddModal = false">
      <div class="modal-box"
           x-data="ingredientModal(editTarget)">
        <p class="modal-title" x-text="editId ? '재료 수정' : '새 재료 추가'"></p>
        <div class="form-group">
          <label class="form-label">식재료명</label>
          <input class="form-input" x-model="form.name" placeholder="예: 소고기" required>
        </div>
        <div class="form-group">
          <label class="form-label">이모지 선택</label>
          <input class="form-input" x-model="emojiSearch"
                 placeholder="🔍 이모지 검색 (예: 닭, 당근, fish…)"
                 style="margin-bottom:.5rem;">
          <template x-if="displayEmojis.length === 0">
            <p style="font-size:.8rem;color:var(--text-muted);padding:.25rem 0;">검색 결과 없음</p>
          </template>
          <div class="emoji-grid">
            <template x-for="e in displayEmojis" :key="e">
              <button class="emoji-btn" :class="form.emoji===e?'selected':''"
                      @click="form.emoji=e; emojiSearch=''" type="button"
                      :title="e">
                <img :src="emojiToCdnUrl(e)" width="24" height="24"
                     style="object-fit:contain;pointer-events:none;"
                     loading="lazy" alt=""
                     @error="$el.style.display='none'; $el.nextElementSibling.style.display='inline'">
                <span style="display:none" x-text="e"></span>
              </button>
            </template>
          </div>
          <p style="font-size:.72rem;color:var(--text-muted);margin-top:.35rem;">
            <template x-if="emojibaseLoading">
              <span>⏳ 이모지 데이터 로딩 중…</span>
            </template>
            <template x-if="!emojibaseLoading && !emojiSearch">
              <span x-text="emojibaseReady ? '자주 쓰는 이모지 • 검색으로 1,800개 이상 찾기' : '자주 쓰는 이모지 • 검색으로 더 찾기'"></span>
            </template>
          </p>
        </div>
        <div class="form-group">
          <label class="form-label">큐브 색상</label>
          <div class="color-grid">
            <template x-for="c in presetColors" :key="c">
              <button class="color-btn" :class="form.color===c?'selected':''"
                      :style="`background-color:${c}`"
                      @click="form.color=c" type="button"></button>
            </template>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">제작일</label>
            <input class="form-input" type="date" x-model="form.created_at" required>
          </div>
          <div class="form-group">
            <label class="form-label">1큐브 중량 (g)</label>
            <input class="form-input" type="number" x-model.number="form.weight_per_cube" min="1" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">총 제작 개수</label>
          <input class="form-input" type="number" x-model.number="form.total_cubes" min="1" required>
        </div>
        <div class="form-actions">
          <button class="btn btn-muted" @click="$dispatch('close-modal')">취소</button>
          <button class="btn btn-green" @click="submit()" x-text="editId?'수정 완료':'추가하기'"></button>
        </div>
      </div>
    </div>
  </template>

</div>
{% endblock %}
