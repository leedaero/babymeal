{% extends "_base.html" %}
{% set active_tab = 'stats' %}
{% block title %}통계 — 치밀한 이유식{% endblock %}
{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div x-data="statsPage()" x-init="init()">

  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-value" x-text="ingredients.length + '가지'">—</p>
      <p class="stat-label">재료 종류</p>
    </div>
    <div class="stat-card">
      <p class="stat-value" x-text="totalCubes + '개'">—</p>
      <p class="stat-label">총 큐브 수</p>
    </div>
    <div class="stat-card">
      <p class="stat-value" :class="lowStockCount > 0 ? 'stat-danger' : ''" x-text="lowStockCount + '가지'">—</p>
      <p class="stat-label">재고 부족 (3개 이하)</p>
    </div>
  </div>

  <div class="chart-wrap">
    <p class="chart-title">재료별 재고 현황</p>
    <p x-show="ingredients.length === 0"
       style="text-align:center;color:var(--text-muted);padding:2rem 0;">등록된 재료가 없습니다.</p>
    <div x-show="ingredients.length > 0"
         :style="`height:${Math.max(ingredients.length * 46, 120)}px`">
      <canvas id="stockChart"></canvas>
    </div>
    <div x-show="selected" x-cloak class="ing-detail-card">
      <div class="ing-detail-header">
        <span x-text="(selected?.emoji ?? '') + ' ' + (selected?.name ?? '')"></span>
        <button class="ing-detail-close" @click="selected = null">✕</button>
      </div>
      <div class="ing-detail-row">
        <span>남은 큐브</span>
        <strong x-text="(selected?.current_cubes ?? '') + '개'"></strong>
      </div>
      <template x-if="selected?.unit_type === 'weight' && selected?.weight_per_cube">
        <div>
          <div class="ing-detail-row">
            <span>큐브당</span>
            <strong x-text="selected.weight_per_cube + 'g'"></strong>
          </div>
          <div class="ing-detail-row">
            <span>총량</span>
            <strong x-text="(selected.current_cubes * selected.weight_per_cube) + 'g'"></strong>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>
{% endblock %}
